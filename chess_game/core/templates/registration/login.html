<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chess — Log in</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 360px; margin: 4rem auto; padding: 0 1rem; background: #262421; color: #eee; }
        h1 { font-weight: 600; }
        label { display: block; margin-top: 0.8rem; color: #bbb; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; margin-top: 0.3rem; background: #1b1a17; color: #eee; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 1.2rem; width: 100%; background: #629924; color: #fff; border: none; padding: 0.7rem; font-size: 1rem; border-radius: 6px; cursor: pointer; }
        button:hover { background: #74b32c; }
        a { color: #8fbcff; }
        .errors { color: #ff6b6b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>♞ Log in</h1>
    {% if form.errors %}<p class="errors">Wrong username or password.</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <label>Username <input type="text" name="username" autofocus required></label>
        <label>Password <input type="password" name="password" required></label>
        <button type="submit">Log in</button>
    </form>
    <p>No account? <a href="{% url 'signup' %}">Sign up</a> · <a href="{% url 'home' %}">Home</a></p>
</body>
</html>
